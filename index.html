<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radar Search + FeatureLayer</title>
  </head>
  <body>
    <div class="layout">
      <!-- <aside class="left">
        <div id="queryDiv"></div>

        <div class="filters">
          <div id="filter-name"></div>
          <div id="filter-prefecture"></div>
          <div id="filter-category"></div>
          <div id="filter-keywords"></div>
          <div id="filter-ranking"></div>
        </div>
      </aside> -->
      <aside class="left">
        <calcite-tabs layout="inline">
          <calcite-tab-nav slot="title-group">
            <calcite-tab-title active>その他</calcite-tab-title>
            <calcite-tab-title>レーダー＋フレーバ</calcite-tab-title>
          </calcite-tab-nav>

          <!-- 1) その他 -->
          <calcite-tab active>
            <div class="filters">
              <div id="filter-name"></div>
              <div id="filter-prefecture"></div>
              <div id="filter-category"></div>
              <div id="filter-ranking"></div>
            </div>
          </calcite-tab>

          <!-- 2) レーダー + フレーバ（上下に積む） -->
          <calcite-tab>
            <div class="advanced-stack">
              <section class="panel">
                <h3 class="panel-title">レーダー</h3>
                <div id="tab-radar"></div>
              </section>

              <section class="panel">
                <h3 class="panel-title">フレーバータグ（AND）</h3>
                <div id="tab-keywords"></div>
              </section>
            </div>
          </calcite-tab>
        </calcite-tabs>
      </aside>
      

      <main class="center">
        <!-- 将来ここに地図 -->
        <div id="viewDiv"></div>
      </main>

      <aside class="right">
        <div id="resultsDiv"></div>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>

  
</html>
